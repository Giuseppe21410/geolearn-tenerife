<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>GeoLearn Tenerife</title>
    
    <!-- Conexiones externas necesarias -->
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Iconos de la aplicación (Mobile/PWA) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Precarga de logo (Opcional pero recomendado para evitar parpadeos visuales) -->
    <link rel="preload" as="image" href="/logo-pagina.png" fetchpriority="high" />
    
    <!-- Colores del tema para la interfaz móvil (barra de notificaciones y navegador) -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    
    <!-- Estilos requeridos para el mapa Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" media="print" onload="this.media='all'" />
    <noscript>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
